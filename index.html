<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8"/>
    <link rel="icon" type="image/x-icon" href="./favicon.png">
    <script src="phaser.min.js"></script>
    <style>
        #container {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 0px solid black;
            width: 800px;
            height:480px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5 );
            padding: 10px;
            margin-left: -400px;
            margin-top: -240px;
            text-align: center;
        }
    </style>
  </head>
  <body>
  
<div id='container'></div>

<script type=module>

import { phaserconfig } from "./phaserconfig.js"
import { config } from "./config.js"
import { Preload } from "./preload.js"
import { Map1 } from "./map1.js"
import { Map2 } from "./map2.js"
import { Map3 } from "./map3.js"
import { Map4 } from "./map4.js"
import { Map6 } from "./map6.js"
import { Map5 } from "./map5.js"



let game = new Phaser.Game(phaserconfig);
game.scene.add("preload", Preload);
game.scene.add('map1', Map1);
game.scene.add('map2', Map2);
game.scene.add('map6', Map6);

game.scene.add('map3', Map3);
game.scene.add('map4', Map4);
game.scene.add('map5', Map5);
game.scene.start("preload");

</script>

</body>
</html>
